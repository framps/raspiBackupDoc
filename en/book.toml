[book]
authors = ["framp", "simonz"]
language = "en"
src = "src"
title = "raspiBackup Documentation"

[build]
build-dir = "book"

[preprocessor]

[preprocessor.toc]
command = "mdbook-toc"
renderer = ["html"]
max-level = 3

[output]

[output.html]
additional-css = ["language-picker.css", "raspiBackupDoc.css"]
site-url = "/raspiBackupDoc/"
no-section-label = false
git-repository-url = "https://github.com/framps/raspiBackupDoc"
git-repository-icon = "fab-github"
edit-url-template = "https://github.com/framps/raspiBackupDoc/edit/main/en/{path}"
sidebar-header-nav = false

[output.html.fold]
enable = true
